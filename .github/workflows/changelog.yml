# ============================================================
#  Auto-generate CHANGELOG on every GitHub Release
# ============================================================

name: Generate Changelog

on:
  release:
    types: [published]

jobs:
  changelog:
    name: Update CHANGELOG.md
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        run: |
          curl -sSL https://github.com/orhun/git-cliff/releases/latest/download/git-cliff-x86_64-unknown-linux-gnu.tar.gz | tar -xz
          sudo mv git-cliff-*/git-cliff /usr/local/bin/

      - name: Generate CHANGELOG.md
        run: git-cliff --config cliff.toml --output CHANGELOG.md

      - name: Commit and push CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: auto-update CHANGELOG for ${{ github.ref_name }}" || echo "No changes to commit"
          git push